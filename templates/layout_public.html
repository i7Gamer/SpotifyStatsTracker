<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        const savedTheme = localStorage.getItem('spotify-stats-theme') || 'theme-rose';
        document.documentElement.className = savedTheme;
      })();

      // See layout.html's identical comment - must be defined here in <head>,
      // before any <img onerror> can fire.
      window.PLACEHOLDER_IMG = "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%231d1d1d'/><path d='M62 24v34.8a12 12 0 1 0 6 10.4V36l10-3v-9l-16 4z' fill='%23555'/></svg>";
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="title" content="Spotify Tracker" />
    <meta name="description" content="Keep track of your Spotify listening habits with this Spotify Tracker." />
    <title>Spotify Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <main class="page">{% block content %}{% endblock %}</main>
    <script src="{{ url_for('static', filename='js/artist-toggle.js') }}"></script>
    <script>
      // Smooth fade-in for track cover images - mirrors layout.html.
      (function() {
        document.addEventListener('load', (e) => {
          if (e.target.tagName === 'IMG' && e.target.classList.contains('track-cover')) {
            e.target.classList.add('loaded');
          }
        }, true);

        function markLoadedImages() {
          document.querySelectorAll('img.track-cover').forEach(img => {
            if (img.complete) {
              img.classList.add('loaded');
            }
          });
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', markLoadedImages);
        } else {
          markLoadedImages();
        }
      })();

      // Scroll-to-top button with circular progress - mirrors layout.html.
      // Deferred to DOMContentLoaded because the button element lives near
      // </body>, after this parse-time script.
      (function() {
        function initScrollToTop() {
        const btn = document.getElementById('scroll-to-top');
        const circle = btn ? btn.querySelector('.progress-ring__circle') : null;
        if (!btn || !circle) return;

        const radius = circle.r.baseVal.value;
        const circumference = 2 * Math.PI * radius;

        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = circumference;

        function setProgress(percent) {
          const offset = circumference - (percent / 100) * circumference;
          circle.style.strokeDashoffset = offset;
        }

        function handleScroll() {
          const scrollTop = window.scrollY || document.documentElement.scrollTop;
          const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;

          if (scrollTop > 300) {
            btn.classList.add('visible');
            btn.style.display = 'flex';
          } else {
            btn.classList.remove('visible');
            setTimeout(() => {
              if (!btn.classList.contains('visible')) {
                btn.style.display = 'none';
              }
            }, 300);
          }

          if (scrollHeight > 0) {
            const percent = (scrollTop / scrollHeight) * 100;
            setProgress(percent);
          } else {
            setProgress(0);
          }
        }

        window.addEventListener('scroll', handleScroll);

        btn.addEventListener('click', () => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', initScrollToTop);
        } else {
          initScrollToTop();
        }
      })();
    </script>

    <button id="scroll-to-top" class="scroll-to-top" aria-label="Scroll to top" style="display:none;">
      <svg class="progress-ring" width="40" height="40">
        <circle class="progress-ring__circle" stroke="var(--accent)" stroke-width="3" fill="transparent" r="16" cx="20" cy="20"/>
      </svg>
      <span class="arrow">&uarr;</span>
    </button>
  </body>
</html>
