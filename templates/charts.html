{% extends "layout.html" %}
{% block content %}
  <section class="hero">
    <div class="hero-content">
      <h1>Charts</h1>
      <p>Visualize your listening habits over time.</p>
    </div>
  </section>

  <form class="filter-section" method="get" action="{{ url_for('chartsPage') }}">
    <div class="filter-group">
      <label for="interval">Time Period:</label>
      <select id="interval" name="interval" onchange="updateChartsIntervalFilter()">
        <option value="day" {% if interval == 'day' %}selected{% endif %}>Last Day</option>
        <option value="week" {% if interval == 'week' %}selected{% endif %}>Last Week</option>
        <option value="month" {% if interval == 'month' %}selected{% endif %}>Last Month</option>
        <option value="year" {% if interval == 'year' %}selected{% endif %}>Last Year</option>
        <option value="5years" {% if interval == '5years' %}selected{% endif %}>Last 5 Years</option>
        <option value="all time" {% if interval == 'all time' %}selected{% endif %}>All Time</option>
        <option value="custom" {% if interval == 'custom' %}selected{% endif %}>Custom Date Range</option>
      </select>
    </div>

    <div class="filter-group custom-dates" id="chartsCustomDates" {% if interval != 'custom' %}style="display: none;"{% endif %}>
      <label for="startDate">From:</label>
      <input type="date" id="startDate" name="startDate" value="{{ customStart }}" onchange="scheduleSearchFilter('startDate', updateChartsDateFilter)">
      <label for="endDate">To:</label>
      <input type="date" id="endDate" name="endDate" value="{{ customEnd }}" onchange="scheduleSearchFilter('endDate', updateChartsDateFilter)">
    </div>

    <div class="filter-group">
      <label for="groupBy">Group by:</label>
      <select id="groupBy" name="groupBy" onchange="updateChartsFilters()">
        <option value="day" {% if groupBy == 'day' %}selected{% endif %}>Day</option>
        <option value="week" {% if groupBy == 'week' %}selected{% endif %}>Week</option>
      </select>
    </div>

    <noscript>
      <button class="primary-button" type="submit">Apply</button>
    </noscript>
  </form>

  <section class="card chart-card">
    <div class="chart-section">
      <h2>Listening Time &middot; {{ intervalLabel }}</h2>
      <div class="chart-canvas-wrap">
        <canvas id="timeSeriesChart"></canvas>
      </div>
    </div>

    <div class="chart-section">
      <h2>When You Listen</h2>
      <p class="chart-subtitle">Total listening time by day of week and hour of day.</p>
      <div class="chart-canvas-wrap heatmap-wrap">
        <canvas id="heatmapChart"></canvas>
      </div>
    </div>

    <div class="chart-section">
      <h2>Top Artists Over Time</h2>
      <div class="chart-canvas-wrap">
        <canvas id="artistTrendChart"></canvas>
      </div>
      <div id="artistTrendLegend" class="chart-legend"></div>
    </div>
  </section>

  <script>
    window.__chartData = {
      timeSeries: {{ timeSeries | tojson }},
      heatmap: {{ heatmap | tojson }},
      artistTrend: {{ artistTrend | tojson }},
      groupBy: {{ groupBy | tojson }},
      interval: {{ interval | tojson }}
    };

    function updateChartsIntervalFilter() {
      const interval = document.getElementById('interval').value;
      const customDates = document.getElementById('chartsCustomDates');

      if (interval === 'custom') {
        customDates.style.display = 'flex';
        return;
      }

      customDates.style.display = 'none';
      updateChartsFilters();
    }

    function updateChartsDateFilter() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;

      if (startDate && endDate) {
        updateChartsFilters(true);
      }
    }

    function updateChartsFilters(forceCustom = false) {
      const interval = document.getElementById('interval').value;
      const groupBy = document.getElementById('groupBy').value;
      const params = new URLSearchParams(window.location.search);

      params.set('groupBy', groupBy);

      if (interval === 'custom' || forceCustom) {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;

        if (!startDate || !endDate) {
          return;
        }

        params.set('interval', 'custom');
        params.set('startDate', startDate);
        params.set('endDate', endDate);
      } else {
        params.set('interval', interval);
        params.delete('startDate');
        params.delete('endDate');
      }

      window.location = window.location.pathname + '?' + params.toString();
    }
  </script>
  <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
{% endblock %}
