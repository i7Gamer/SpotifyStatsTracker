{% extends "layout.html" %}
{% block content %}
  <section class="hero">
    <div class="hero-content">
      <h1>Charts</h1>
      <p>Visualize your listening habits over time.</p>
    </div>
  </section>

  {# method/action kept for the <noscript> fallback; with JS the controls fire
     the AJAX filter handlers in charts-page.js and never submit this form. #}
  <form class="filter-section" method="get" action="{{ url_for('chartsPage') }}">
    <div class="filter-group">
      <label for="interval">Time Period:</label>
      <select id="interval" name="interval" onchange="updateChartsIntervalFilter()">
        <option value="today" {% if interval == 'today' %}selected{% endif %}>Today</option>
        <option value="day" {% if interval == 'day' %}selected{% endif %}>Yesterday</option>
        <option value="week" {% if interval == 'week' %}selected{% endif %}>Last Week</option>
        <option value="month" {% if interval == 'month' %}selected{% endif %}>Last Month</option>
        <option value="year" {% if interval == 'year' %}selected{% endif %}>Last Year</option>
        <option value="5years" {% if interval == '5years' %}selected{% endif %}>Last 5 Years</option>
        <option value="all time" {% if interval == 'all time' %}selected{% endif %}>All Time</option>
        <option value="custom" {% if interval == 'custom' %}selected{% endif %}>Custom Date Range</option>
      </select>
    </div>

    <div class="filter-group custom-dates" id="chartsCustomDates" {% if interval != 'custom' %}style="display: none;"{% endif %}>
      <label for="startDate">From:</label>
      <input type="date" id="startDate" name="startDate" value="{{ customStart }}" onchange="scheduleSearchFilter('startDate', updateChartsDateFilter)">
      <label for="endDate">To:</label>
      <input type="date" id="endDate" name="endDate" value="{{ customEnd }}" onchange="scheduleSearchFilter('endDate', updateChartsDateFilter)">
      <span id="dateError" style="color: var(--accent); font-size: 0.85rem; display: none; margin-left: 10px;"></span>
    </div>

    <div class="filter-group" id="groupByContainer" {% if interval in ['today', 'day'] %}style="display: none;"{% endif %}>
      <label for="groupBy">Trend buckets:</label>
      <select id="groupBy" name="groupBy" onchange="updateChartsFilters()">
        <option value="" {% if not groupBy %}selected{% endif %}>Auto</option>
        <option value="day" {% if groupBy == 'day' %}selected{% endif %}>Day</option>
        <option value="week" {% if groupBy == 'week' %}selected{% endif %}>Week</option>
        <option value="month" {% if groupBy == 'month' %}selected{% endif %}>Month</option>
      </select>
    </div>

    <noscript>
      <button class="primary-button" type="submit">Apply</button>
    </noscript>
  </form>

  <section class="card chart-card" id="chartsCard">
    <div class="chart-section">
      <h2>Listening Time &middot; <span id="chartsTimeSeriesLabel">{{ intervalLabel }}{% if lastDayDate %} ({{ lastDayDate }}){% endif %}</span></h2>
      <div class="chart-canvas-wrap">
        <canvas id="timeSeriesChart"></canvas>
      </div>
    </div>

    <div class="chart-section">
      <h2>When You Listen</h2>
      <p class="chart-subtitle">Total listening time by day of week and hour of day.</p>
      <div class="chart-canvas-wrap heatmap-wrap">
        <canvas id="heatmapChart"></canvas>
      </div>
    </div>

    {# Hidden until the payload confirms a multi-bucket range: single-day views
       carry no artist trend, so charts-page.js re-hides it then. #}
    <div class="chart-section" id="chartsArtistTrendSection" {% if isSingleDayView %}style="display: none;"{% endif %}>
      <h2>Top Artists &middot; <span id="chartsArtistTrendLabel">{{ intervalLabel }}</span></h2>
      <div class="chart-canvas-wrap">
        <canvas id="artistTrendChart"></canvas>
      </div>
      <div id="artistTrendLegend" class="chart-legend"></div>
    </div>

    <div class="chart-section-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; margin-top: 2rem;">
      <div class="chart-section">
        <h2>Explicit vs Clean Content</h2>
        <div class="chart-canvas-wrap" style="height: 250px;">
          <canvas id="explicitChart"></canvas>
        </div>
      </div>

      <div class="chart-section">
        <h2>Completion vs Skips</h2>
        <div class="chart-canvas-wrap" style="height: 250px;">
          <canvas id="completionChart"></canvas>
        </div>
      </div>
    </div>

    <div class="chart-section" style="margin-top: 2rem;">
      <h2>Release Era Distribution</h2>
      <div class="chart-canvas-wrap" style="height: 300px;">
        <canvas id="decadeChart"></canvas>
      </div>
    </div>

    {% if lastfmEnabled %}
    <div class="chart-section" style="margin-top: 2rem;">
      <h2>Top Genres</h2>
      {# Filled by the /charts?ajax=true payload (genreSectionHtml) - its
         locked/unlocked structure is range-scoped, so it ships as HTML. #}
      <div id="chartsGenreSection"><p class="loading">Loading…</p></div>
    </div>
    {% endif %}
  </section>

  {# charts.js is shared with /compare, where it renders inline at load. Here
     the data is fetched after first paint instead, so tell charts.js to skip
     its own initial render - charts-page.js drives it once the payload lands. #}
  <script>
    window.__deferInitialChartRender = true;
    // Profile default window - the popstate fallback interval for a bare URL
    // (no ?interval), so Back to it re-selects what the server would resolve.
    window.__chartsDefaultInterval = {{ defaultWindow | tojson }};
  </script>
  <script src="{{ url_for('static', filename='js/chart-utils.js') }}"></script>
  <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
  <script src="{{ url_for('static', filename='js/charts-page.js') }}"></script>
{% endblock %}
