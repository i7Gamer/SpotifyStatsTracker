<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="title" content="Spotify Tracker" />
    <meta name="description" content="Keep track of your Spotify listening habits with this Spotify Tracker." />
    <title>Spotify Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Spotify Tracker</div>
      <div id="version-badge" class="version-badge" style="display:none;">
        <span id="version-badge-text"></span>
      </div>
      <button id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav-links" id="nav-menu">
        {% set currentQuery = request.args.get('q', '') %}
        <a class="{{ 'active' if section == 'dashboard' }}" {% if section == 'dashboard' %}aria-current="page"{% endif %} href="{{ url_for('dashboard', q=currentQuery) if currentQuery else url_for('dashboard') }}">Dashboard</a>
        <a class="{{ 'active' if section == 'top_songs' }}" {% if section == 'top_songs' %}aria-current="page"{% endif %} href="{{ url_for('topSongsPage', q=currentQuery) if currentQuery else url_for('topSongsPage') }}">Top Songs</a>
        <a class="{{ 'active' if section == 'top_artists' }}" {% if section == 'top_artists' %}aria-current="page"{% endif %} href="{{ url_for('topArtistsPage', q=currentQuery) if currentQuery else url_for('topArtistsPage') }}">Top Artists</a>
        <a class="{{ 'active' if section == 'top_albums' }}" {% if section == 'top_albums' %}aria-current="page"{% endif %} href="{{ url_for('topAlbumsPage', q=currentQuery) if currentQuery else url_for('topAlbumsPage') }}">Top Albums</a>
        <a class="{{ 'active' if section == 'charts' }}" {% if section == 'charts' %}aria-current="page"{% endif %} href="{{ url_for('chartsPage') }}">Charts</a>
        <a class="{{ 'active' if section == 'wrapped' }}" {% if section == 'wrapped' %}aria-current="page"{% endif %} href="{{ url_for('wrappedPage') }}">Wrapped</a>
        <a class="{{ 'active' if section == 'import' }}" {% if section == 'import' %}aria-current="page"{% endif %} href="{{ url_for('importPage') }}">Import</a>
        <a href="{{ url_for('logout') }}">Logout</a>
      </nav>
    </header>

    <main class="page">{% block content %}{% endblock %}</main>
    <script>
      // Shown in place of a track/artist/album cover that 404s or fails to
      // load (not yet downloaded, or the fetch failed) instead of a broken-
      // image icon - a plain music-note glyph on the app's surface color.
      window.PLACEHOLDER_IMG = "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%231d1d1d'/><path d='M62 24v34.8a12 12 0 1 0 6 10.4V36l10-3v-9l-16 4z' fill='%23555'/></svg>";

      window.__searchDebounceTimers = window.__searchDebounceTimers || {};

      window.scheduleSearchFilter = function(searchInputId, applyFilterFn, delayMs = 500) {
        const searchInput = document.getElementById(searchInputId);
        if (!searchInput) {
          return;
        }

        window.clearTimeout(window.__searchDebounceTimers[searchInputId]);
        window.__searchDebounceTimers[searchInputId] = window.setTimeout(() => {
          applyFilterFn();
        }, delayMs);
      };

      window.handleSearchKeydown = function(event, applyFilterFn) {
        if (event.key !== 'Enter') {
          return;
        }

        event.preventDefault();
        applyFilterFn();
      };

      // Search boxes only navigate on Enter or when the field is left (blur) -
      // not on every keystroke - so typing doesn't reload the page/reset
      // scroll and focus mid-word.
      window.handleSearchBlur = function(event, applyFilterFn) {
        const params = new URLSearchParams(window.location.search);
        const currentQ = params.get('q') || '';
        if (event.target.value.trim() !== currentQ.trim()) {
          applyFilterFn();
        }
      };

      // Shared by song_detail.html/artist_detail.html/album_detail.html's
      // group-by dropdown next to the back button.
      window.updateDetailGroupByFilter = function() {
        const groupBy = document.getElementById('groupBy').value;
        const params = new URLSearchParams(window.location.search);
        params.set('groupBy', groupBy);
        window.location = window.location.pathname + '?' + params.toString();
      };

      // _pagination.html's "Go to page" input - Enter navigates, clamped to
      // [1, totalPages] so a stray typo can't request a nonexistent page.
      window.handleJumpToPageKeydown = function(event, totalPages) {
        if (event.key !== 'Enter') {
          return;
        }
        event.preventDefault();

        const value = parseInt(event.target.value, 10);
        if (!Number.isInteger(value)) {
          return;
        }

        const page = Math.min(Math.max(value, 1), totalPages);
        const params = new URLSearchParams(window.location.search);
        params.set('page', page);
        window.location = window.location.pathname + '?' + params.toString();
      };

      (function(){
        const badge = document.getElementById('version-badge');
        const textEl = document.getElementById('version-badge-text');

        function hideBadge(){
          badge.style.display = 'none';
        }
        function checkVersion(){
          fetch('/version_status').then(r=>r.json()).then(data=>{
            if(data && data.latest){
              textEl.textContent = `New version: ${data.latest} (you: ${data.current})`;
              badge.style.display = 'inline-flex';
            } else {
              hideBadge();
            }
          }).catch(()=>{});
        }

        checkVersion();
        setInterval(checkVersion, 15 * 60 * 1000);
      })();

      (function(){
        const navToggle = document.getElementById('nav-toggle');
        const navMenu = document.getElementById('nav-menu');

        if (!navToggle || !navMenu) return;

        navToggle.addEventListener('click', () => {
          navMenu.classList.toggle('active');
          navToggle.classList.toggle('active');
        });

        navMenu.querySelectorAll('a').forEach(link => {
          link.addEventListener('click', () => {
            navMenu.classList.remove('active');
            navToggle.classList.remove('active');
          });
        });
      })();


    </script>
  </body>
</html>
