<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="title" content="Spotify Tracker" />
    <meta name="description" content="Keep track of your Spotify listening habits with this Spotify Tracker." />
    <title>Spotify Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Spotify Tracker</div>
      <div id="version-badge" class="version-badge" style="display:none;">
        <span id="version-badge-text"></span>
      </div>
      <button id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav-links" id="nav-menu">
        {% set currentQuery = request.args.get('q', '') %}
        <a href="{{ url_for('dashboard', q=currentQuery) if currentQuery else url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('topSongsPage', q=currentQuery) if currentQuery else url_for('topSongsPage') }}">Top Songs</a>
        <a href="{{ url_for('topArtistsPage', q=currentQuery) if currentQuery else url_for('topArtistsPage') }}">Top Artists</a>
        <a href="{{ url_for('topAlbumsPage', q=currentQuery) if currentQuery else url_for('topAlbumsPage') }}">Top Albums</a>
        <a href="{{ url_for('chartsPage') }}">Charts</a>
        <a href="{{ url_for('wrappedPage') }}">Wrapped</a>
        <a href="{{ url_for('importPage') }}">Import</a>
        <a href="{{ url_for('logout') }}">Logout</a>
      </nav>
    </header>

    <main class="page">{% block content %}{% endblock %}</main>
    <script>
      window.__searchDebounceTimers = window.__searchDebounceTimers || {};

      window.scheduleSearchFilter = function(searchInputId, applyFilterFn, delayMs = 500) {
        const searchInput = document.getElementById(searchInputId);
        if (!searchInput) {
          return;
        }

        window.clearTimeout(window.__searchDebounceTimers[searchInputId]);
        window.__searchDebounceTimers[searchInputId] = window.setTimeout(() => {
          applyFilterFn();
        }, delayMs);
      };

      window.handleSearchKeydown = function(event, applyFilterFn) {
        if (event.key !== 'Enter') {
          return;
        }

        event.preventDefault();
        applyFilterFn();
      };

      (function(){
        const badge = document.getElementById('version-badge');
        const textEl = document.getElementById('version-badge-text');

        function hideBadge(){
          badge.style.display = 'none';
        }
        function checkVersion(){
          fetch('/version_status').then(r=>r.json()).then(data=>{
            if(data && data.latest){
              textEl.textContent = `New version: ${data.latest} (you: ${data.current})`;
              badge.style.display = 'inline-flex';
            } else {
              hideBadge();
            }
          }).catch(()=>{});
        }

        checkVersion();
        setInterval(checkVersion, 15 * 60 * 1000);
      })();

      (function(){
        const navToggle = document.getElementById('nav-toggle');
        const navMenu = document.getElementById('nav-menu');

        if (!navToggle || !navMenu) return;

        navToggle.addEventListener('click', () => {
          navMenu.classList.toggle('active');
          navToggle.classList.toggle('active');
        });

        navMenu.querySelectorAll('a').forEach(link => {
          link.addEventListener('click', () => {
            navMenu.classList.remove('active');
            navToggle.classList.remove('active');
          });
        });
      })();

      window.addEventListener('load', () => {
        const searchInput = document.querySelector('.auto-search-focus');
        if (!searchInput) {
          return;
        }

        searchInput.focus();
        const valueLength = searchInput.value.length;
        searchInput.setSelectionRange(valueLength, valueLength);
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  </body>
</html>
