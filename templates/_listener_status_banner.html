{% if listener_health %}
<div id="listener-status-banner" class="listener-status-banner listener-status-{{ listener_health|lower }}" style="display:none;">
  <div class="listener-status-content">
    <span class="listener-status-icon" id="listener-status-icon"></span>
    <span class="listener-status-text" id="listener-status-text"></span>
  </div>
  <button class="listener-status-close" id="listener-status-close" aria-label="Dismiss notification">&times;</button>
</div>

<style>
.listener-status-banner {
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  font-weight: 500;
  animation: slideDown 0.3s ease-out;
}

@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.listener-status-banner.listener-status-healthy {
  background-color: rgba(76, 175, 80, 0.1);
  color: #4CAF50;
  border-bottom: 1px solid rgba(76, 175, 80, 0.2);
}

.listener-status-banner.listener-status-degraded {
  background-color: rgba(255, 193, 7, 0.1);
  color: #FFC107;
  border-bottom: 1px solid rgba(255, 193, 7, 0.2);
}

.listener-status-banner.listener-status-dead {
  background-color: rgba(244, 67, 54, 0.1);
  color: #F44336;
  border-bottom: 1px solid rgba(244, 67, 54, 0.2);
}

.listener-status-content {
  display: flex;
  align-items: center;
  gap: 8px;
}

.listener-status-icon {
  display: inline-block;
  width: 16px;
  height: 16px;
  border-radius: 50%;
}

.listener-status-banner.listener-status-healthy .listener-status-icon {
  background-color: #4CAF50;
}

.listener-status-banner.listener-status-degraded .listener-status-icon {
  background-color: #FFC107;
  animation: pulse 1s infinite;
}

.listener-status-banner.listener-status-dead .listener-status-icon {
  background-color: #F44336;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.listener-status-close {
  background: none;
  border: none;
  color: inherit;
  cursor: pointer;
  font-size: 20px;
  padding: 0 4px;
  opacity: 0.7;
  transition: opacity 0.2s;
}

.listener-status-close:hover {
  opacity: 1;
}
</style>
{% endif %}
