{% extends "layout.html" %}
{% block content %}
  <section class="hero">
    <div class="hero-content">
      <h1>{{ song.get('name', '') }}</h1>
      <p>{{ song.get('artistsText', '') }}</p>
    </div>
  </section>

  <p><a id="back-button" class="button" href="{{ url_for('topSongsPage') }}">&larr; Back to Top Songs</a></p>

  <section id="track-list" class="track-list">
    {% set track = song %}
    {% set section = 'top_songs' %}
    {% set item_number = '' %}
    {% include '_track_card.html' %}
  </section>

  <section class="card chart-card">
    <div class="chart-section">
      <h2>Play History</h2>
      <div class="chart-canvas-wrap">
        <canvas id="timeSeriesChart"></canvas>
      </div>
    </div>
  </section>

  <script>
    window.__chartData = {
      timeSeries: {{ timeSeries | tojson }}
    };

    const backButton = document.getElementById('back-button');
    if (backButton && document.referrer.includes('wrapped')) {
      backButton.textContent = '← Back to Wrapped';
      backButton.href = '#';
      backButton.onclick = (e) => {
        e.preventDefault();
        history.back();
      };
    }
  </script>
  <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
{% endblock %}
