name: Tests

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Matches the Dockerfile's python:3.13-slim base image.
          python-version: "3.13"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-xdist

      - name: Run tests
        run: pytest tests -q --durations=20 -n auto
